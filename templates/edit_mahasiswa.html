{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm mb-3" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="card card-body shadow-sm">
            <h5>Edit Data Mahasiswa</h5>
            <hr>
           <form action="/mahasiswa/edit/{{ mhs.nim }}" method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label>NIM</label>
        <input type="text" name="nim" class="form-control" value="{{ mhs.nim }}" required>
    </div>
    <div class="mb-3">
        <label>Nama Lengkap</label>
        <input type="text" name="nama" class="form-control" value="{{ mhs.nama }}" required>
    </div>
    <div class="mb-3">
        <label>Jurusan</label>
        <input type="text" name="jurusan" class="form-control" value="{{ mhs.jurusan }}" required>
    </div>
    <div class="mb-3">
        <label>Ganti Foto (Kosongkan jika tidak ingin diubah)</label>
        <input type="file" name="foto" class="form-control" accept="image/*">
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary flex-grow-1">Simpan Perubahan</button>
        <a href="/mahasiswa" class="btn btn-secondary">Batal</a>
    </div>
</form>
        </div>
    </div>
</div>
{% endblock %}
