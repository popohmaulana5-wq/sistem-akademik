{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-body shadow-sm">
            <h5>Edit Data Matakuliah</h5>
            <hr>
            <form action="/matakuliah/edit/{{ mk.kode_mk }}" method="POST">
                <div class="mb-3">
                    <label>Kode MK (Tidak bisa diubah)</label>
                    <input type="text" name="kode_mk" class="form-control" value="{{ mk.kode_mk }}" readonly>
                </div>
                <div class="mb-3">
                    <label>Nama Matakuliah</label>
                    <input type="text" name="nama_mk" class="form-control" value="{{ mk.nama_mk }}" required>
                </div>
                <div class="mb-3">
                    <label>SKS</label>
                    <input type="number" name="sks" class="form-control" value="{{ mk.sks }}" min="1" max="6" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success flex-grow-1">Simpan Perubahan</button>
                    <a href="/matakuliah" class="btn btn-secondary">Batal</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
